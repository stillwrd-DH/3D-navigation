        function parseLocationText(text) {
        // 大门
        if (text.includes('大门')) {
            const floorMatch = text.match(/(\d)\s*F/i);
            return {
                isDoor: true,
                floor: floorMatch ? parseInt(floorMatch[1]) : 1
            };
        }

        // 书架13 背面 第1列第3层
        const shelfMatch = text.match(
            /书架\s*(\d+).*?(正面|背面).*?第?\s*(\d+)\s*列.*?第?\s*(\d+)\s*层/
        );

        if (!shelfMatch) return null;

        const floorMatch = text.match(/(\d)\s*F/i);
        const shelfIndex = parseInt(shelfMatch[1]);
        
        // 从 SHELVES_CONFIG 中查找书架所在的楼层
        const shelfConfig = SHELVES_CONFIG.find(s => s.index === shelfIndex);
        const floor = floorMatch ? parseInt(floorMatch[1]) : (shelfConfig ? shelfConfig.floor : null);

        return {
        isDoor: false,
        floor: floor,
        shelfIndex: shelfIndex,
        face: shelfMatch[2] === '背面' ? 'back' : 'front',
        column: parseInt(shelfMatch[3]),
        row: parseInt(shelfMatch[4])
    };
}

            }
        }
        
        // 解析回复中的导航信息并设置路径
        function parseAndSetNavigation(reply) {
            // 匹配四个中文括号的内容
            const categoryMatch = reply.match(/（类别[：:]\s*([^）]+)）/);
            const bookMatch = reply.match(/（书名[：:]\s*([^）]+)）/);
            const startMatch = reply.match(/（起点[：:]\s*([^）]+)）/);
            const endMatch = reply.match(/（终点[：:]\s*([^）]+)）/);
            
            if (!startMatch || !endMatch) {
                console.log('未找到完整的导航信息');
                return;
            }
            
            console.log('解析导航信息:', {
                category: categoryMatch?.[1],
                book: bookMatch?.[1],
                start: startMatch?.[1],
                end: endMatch?.[1]
            });
            
            // 解析起点
            const startText = startMatch[1].trim();
            const startData = parseLocationText(startText);
            if (startData) {
                autoSetNavigationPoint(startData, true);
            }
            
            // 解析终点
            const endText = endMatch[1].trim();
            const endData = parseLocationText(endText);
            if (endData) {
                autoSetNavigationPoint(endData, false);
                
                // 如果有书名信息，在终点位置生成气泡文案
                if (bookMatch) {
                    const bookName = bookMatch[1].trim();
                    setTimeout(() => {
                        showBookBubble(endData, bookName);
                    }, 500);
                }
            }
            
            // 自动计算路径
            setTimeout(() => {
                calculateNavigation();
            }, 300);
        }
        
        // 在终点位置显示书籍气泡文案
        function showBookBubble(endData, bookName) {
            // 找到终点所在的楼层
            const floorData = floors[endData.floor];
            if (!floorData) return;
            
            // 获取终点的世界坐标
            const shelfCfg = SHELVES_CONFIG.find(s => s.floor === endData.floor && s.index === endData.shelfIndex);
            if (!shelfCfg) return;
            
            const colOff = (endData.column - 2) * 1.0;
            const rowOff = (endData.row - 2.5) * 0.5;
            const localVec = new THREE.Vector3(colOff, rowOff, endData.face === 'front' ? 0.55 : -0.55);
            const quat = new THREE.Quaternion().setFromEuler(new THREE.Euler(0, shelfCfg.rotation, 0));
            localVec.applyQuaternion(quat);
            const worldX = shelfCfg.centerX + localVec.x;
            const worldY = floorData.yBase + 1.5 + localVec.y;
            const worldZ = shelfCfg.centerZ + localVec.z;
            
            // 创建气泡 Canvas - 根据文字长度自适应尺寸
            const ctx = document.createElement('canvas').getContext('2d');
            ctx.font = 'bold 48px Microsoft YaHei, Arial';
            const textWidth = ctx.measureText(bookName).width;
            const padding = 60;
            const canvasWidth = Math.max(256, textWidth + padding * 2);
            const canvasHeight = 160;
            
            const canvas = document.createElement('canvas');
            canvas.width = canvasWidth;
            canvas.height = canvasHeight;
            const context = canvas.getContext('2d');
            
            // 计算字体大小（根据宽度调整）
            const fontSize = Math.min(48, (canvasWidth - padding * 2) / bookName.length * 1.5);
            
            // 绘制气泡背景（使用路径绘制圆角矩形，兼容旧浏览器）
            context.fillStyle = 'rgba(0, 0, 0, 0.85)';
            const radius = 20;
            context.beginPath();
            context.moveTo(10 + radius, 10);
            context.lineTo(canvasWidth - 10 - radius, 10);
            context.quadraticCurveTo(canvasWidth - 10, 10, canvasWidth - 10, 10 + radius);
            context.lineTo(canvasWidth - 10, canvasHeight - 10 - radius);
            context.quadraticCurveTo(canvasWidth - 10, canvasHeight - 10, canvasWidth - 10 - radius, canvasHeight - 10);
            context.lineTo(10 + radius, canvasHeight - 10);
            context.quadraticCurveTo(10, canvasHeight - 10, 10, canvasHeight - 10 - radius);
            context.lineTo(10, 10 + radius);
            context.quadraticCurveTo(10, 10, 10 + radius, 10);
            context.closePath();
            context.fill();
            
            // 添加发光边框
            context.strokeStyle = 'rgba(255, 107, 53, 0.8)';
            context.lineWidth = 3;
            context.stroke();
            
            // 绘制书名
            context.font = `bold ${fontSize}px Microsoft YaHei, Arial`;
            context.fillStyle = '#ffffff';
            context.textAlign = 'center';
            context.textBaseline = 'middle';
            context.shadowColor = 'rgba(255, 107, 53, 0.8)';
            context.shadowBlur = 15;
            context.fillText(bookName, canvasWidth / 2, canvasHeight / 2);
            
            const texture = new THREE.CanvasTexture(canvas);
            texture.needsUpdate = true;
            
            const spriteMaterial = new THREE.SpriteMaterial({
                map: texture,
                transparent: true,
                depthTest: false
            });
            
            const bubble = new THREE.Sprite(spriteMaterial);
            bubble.position.set(worldX, worldY + 1.2, worldZ);
            // 气泡宽度随文字长度自适应
            const bubbleScale = Math.max(1.5, canvasWidth / 200);
            bubble.scale.set(bubbleScale, canvasHeight / 200, 1);
            bubble.renderOrder = 1000; // 书名气泡最上层
            bubble.userData = { isBookBubble: true };
            
            scene.add(bubble);
            
            // 存储气泡引用以便后续清除
            if (!window.bookBubbles) window.bookBubbles = [];
            window.bookBubbles.push(bubble);
        }
        
        // 清除书籍气泡
        function clearBookBubbles() {
            if (window.bookBubbles) {
                window.bookBubbles.forEach(bubble => {
                    scene.remove(bubble);
                });
                window.bookBubbles = [];
            }
        }
        
        function addMessage(role, content) {
            const div = document.createElement('div');
            div.className = `message message-${role}`;
            
            // 处理助理消息：隐藏四个括号（它们会被解析用于导航）
            let displayContent = content;
            if (role === 'assistant') {
                displayContent = content
                    .replace(/（类别[：:]\s*[^）]+）/g, '')
                    .replace(/（书名[：:]\s*[^）]+）/g, '')
                    .replace(/（起点[：:]\s*[^）]+）/g, '')
                    .replace(/（终点[：:]\s*[^）]+）/g, '')
                    .replace(/\s+/g, ' ')
                    .trim();
            }
            
            div.innerHTML = `<div class="role-tag">${role==='user'?'你':'助理'}</div><div class="bubble">${displayContent}</div>`;
            chatMessagesDiv.appendChild(div);
            chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;
        }
        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', e=>{if(e.key==='Enter') sendMessage();});
        document.getElementById('chatHeader').addEventListener('click', ()=>{
            document.getElementById('chatPanel').classList.toggle('minimized');
        });
        
        // 启动
        loadModels();
        // 添加简单的地面辅助网格 (调试) - 默认隐藏
        const gridHelper = new THREE.GridHelper(40, 20, 0x88aaff, 0x335588);
        gridHelper.position.y = -0.01;
        gridHelper.visible = false; // 隐藏网格
        scene.add(gridHelper);
        
        // 页面加载完成后，发送初始消息
        setTimeout(() => {
            addMessage('assistant', INITIAL_MESSAGE);
            chatHistory.push({role:'assistant', content: INITIAL_MESSAGE});
            parseAndSetNavigation(INITIAL_MESSAGE);
        }, 2000); // 等待2秒让场景加载完成
        
        // 箭头动画状态
        let arrowAnimationTime = 0;
        let lastAnimationTime = performance.now();
        const ARROW_ANIMATION_SPEED = 2.0; // 动画速度
        const ARROW_STEP_DISTANCE = 3.0; // 箭头移动步长（米）
        
        function animate() {
            requestAnimationFrame(animate);
            
            const currentTime = performance.now();
            const deltaTime = (currentTime - lastAnimationTime) / 1000;
            lastAnimationTime = currentTime;
            
            // 更新标签动画（展开/收缩）
            updateLabelAnimations(deltaTime);
            
            // 更新箭头动画
            if (currentPathSegments && currentPathSegments.length > 0) {
                arrowAnimationTime += 0.016; // 约60fps
                
                // 更新平面路径箭头
                for (let f = 1; f <= 3; f++) {
                    if (floors[f].pathArrows && floors[f].pathArrows.length > 0) {
                        const floorPoints = currentPathSegments.filter(pt => pt.floor === f);
                        if (floorPoints.length > 1) {
                            animateFloorArrows(floors[f], floorPoints, arrowAnimationTime);
                        }
                    }
                }
                
                // 更新垂直箭头（电梯）
                animateVerticalArrows(arrowAnimationTime);
            }
            
            controls.update();
            renderer.render(scene, camera);
        }
        
        // 动画平面路径箭头
        function animateFloorArrows(floorData, points, time) {
            if (!points || points.length < 2) return;
            
            const arrows = floorData.pathArrows;
            if (!arrows || arrows.length === 0) return;
            
            // 计算路径总长度
            let totalLength = 0;
            const segmentLengths = [];
            for (let i = 1; i < points.length; i++) {
                const segLen = Math.hypot(
                    points[i].x - points[i-1].x,
                    points[i].z - points[i-1].z
                );
                segmentLengths.push({ start: totalLength, length: segLen, index: i });
                totalLength += segLen;
            }
            
            if (totalLength < 0.1) return;
            
            arrows.forEach((arrow, arrowIndex) => {
                // 每个箭头有不同的时间偏移，形成波浪效果
                // 箭头在路径全长范围内循环移动
                const spacing = totalLength / arrows.length;
                const offset = arrowIndex * spacing;
                const animatedDistance = ((time * ARROW_ANIMATION_SPEED + offset) % totalLength + totalLength) % totalLength;
                
                // 在路径上找到对应距离的位置
                let currentPos = 0;
                let currentPointIndex = 0;
                
                for (let i = 1; i < points.length; i++) {
                    const segLen = segmentLengths[i-1].length;
                    if (currentPos + segLen > animatedDistance) {
                        currentPointIndex = i - 1;
                        break;
                    }
                    currentPos += segLen;
                    if (i === points.length - 1) {
                        currentPointIndex = i;
                    }
                }
                
                // 插值计算箭头位置
                if (currentPointIndex < points.length - 1) {
                    const p1 = points[currentPointIndex];
                    const p2 = points[currentPointIndex + 1];
                    const segLen = segmentLengths[currentPointIndex].length;
                    const segProgress = segLen > 0 ? (animatedDistance - currentPos) / segLen : 0;
                    
                    const newX = p1.x + (p2.x - p1.x) * segProgress;
                    const newZ = p1.z + (p2.z - p1.z) * segProgress;
                    const newY = p1.y + (p2.y - p1.y) * segProgress + 0.08;
                    
                    arrow.position.set(newX, newY, newZ);
                    
                    // 箭头朝向
                    const angle = Math.atan2(p2.x - p1.x, p2.z - p1.z);
                    arrow.rotation.y = angle;
                }
            });
        }
        
        // 动画垂直箭头（电梯）
        function animateVerticalArrows(time) {
            if (!verticalConnectors || verticalConnectors.length === 0) return;
            
            // 找到所有的垂直箭头（通过 userData 标记）
            verticalConnectors.forEach((connector, index) => {
                if (connector.userData && connector.userData.isVerticalArrow) {
                    // 上下移动动画
                    const baseY = connector.userData.baseY;
                    const amplitude = 0.3;
                    connector.position.y = baseY + Math.sin(time * 3 + connector.userData.phase) * amplitude;
                }
            });
        }
        
        // 修改 visualizePath 中的垂直箭头创建，添加动画属性
        const originalVisualizePath = visualizePath;
        visualizePath = function(fullPath) {
            // 清除旧的垂直连接线时也清除动画标记
            verticalConnectors.forEach(conn => {
                if (conn.userData) conn.userData = {};
            });
            
            // 调用原始函数
            originalVisualizePath.call(this, fullPath);
            
            // 检测跨楼层导航，让非路径楼层半透明
            setNonPathFloorsTransparent(fullPath);
            
            // 为垂直箭头添加动画属性
            let arrowIndex = 0;
            for (let i = 1; i < fullPath.length; i++) {
                const prev = fullPath[i-1];
                const curr = fullPath[i];
                if (prev.floor !== curr.floor) {
                    const height = Math.abs(FLOOR_HEIGHTS[curr.floor] - FLOOR_HEIGHTS[prev.floor]);
                    const centerX = (prev.x + curr.x) / 2;
                    const centerZ = (prev.z + curr.z) / 2;
                    const arrowCount = Math.max(3, Math.floor(height / 1.5));
                    
                    for (let j = 0; j < arrowCount; j++) {
                        const arrowY = FLOOR_HEIGHTS[prev.floor] + 0.5 + (j * (height - 1) / arrowCount);
                        const arrowIndexInConnectors = verticalConnectors.length - (arrowCount - j);
                        if (arrowIndexInConnectors >= 0 && verticalConnectors[arrowIndexInConnectors]) {
                            verticalConnectors[arrowIndexInConnectors].userData = {
                                isVerticalArrow: true,
                                baseY: arrowY,
                                phase: (arrowIndex++) * 0.5
                            };
                        }
                    }
                }
            }
        };
        
        // 设置非路径楼层半透明
        function setNonPathFloorsTransparent(fullPath) {
            // 找出路径经过的楼层
            const pathFloors = new Set();
            fullPath.forEach(pt => pathFloors.add(pt.floor));
            
            // 如果只在一个楼层，不需要半透明
            if (pathFloors.size <= 1) {
                resetFloorTransparency();
                return;
            }
            
            // 找出路径中楼层高度的最大值（最上层）
            const maxFloorInPath = Math.max(...Array.from(pathFloors));
            // 找出路径中楼层高度的最小值（最下层）
            const minFloorInPath = Math.min(...Array.from(pathFloors));
            
            // 对所有楼层进行处理
            for (let f = 1; f <= 3; f++) {
                if (!pathFloors.has(f)) {
                    // 不在路径上的楼层，保持原样（正常显示）
                    setFloorTransparency(f, 1.0);
                } else if (f > minFloorInPath) {
                    // 在路径上且不是最下层的楼层，半透明（上层视角）
                    setFloorTransparency(f, 0.3);
                } else {
                    // 在路径上且是最下层的楼层，保持正常显示
                    setFloorTransparency(f, 1.0);
                }
            }
        }
        
        // 设置指定楼层的透明度
        function setFloorTransparency(floorNum, opacity) {
            const floorData = floors[floorNum];
            if (!floorData || !floorData.group) return;
            
            // 存储原始透明度状态
            if (floorData.originalOpacity === undefined) {
                floorData.originalOpacity = 1.0;
            }
            
            // 遍历楼层中的所有网格对象
            floorData.group.traverse(obj => {
                if (obj.isMesh && obj.material) {
                    // 检查是否是点击层（书架格子或大门），保持永远可见
                    if (obj.userData && (obj.userData.isShelfLayer || obj.userData.isDoor)) {
                        obj.visible = true;
                        return;
                    }
                    
                    // 如果材质还没有transparencyState，保存原始状态
                    if (obj.material.userData === undefined) {
                        obj.material.userData = {};
                    }
                    if (obj.material.userData.originalOpacity === undefined && obj.material.opacity !== undefined) {
                        obj.material.userData.originalOpacity = obj.material.opacity;
                    }
                    
                    // 设置透明度
                    if (obj.material.transparent !== true) {
                        obj.material.transparent = true;
                    }
                    obj.material.opacity = opacity * (obj.material.userData.originalOpacity || 1.0);
                    
                    // 如果是完全透明，也隐藏对象（但点击层除外）
                    obj.visible = opacity > 0.05;
                }
            });
            
            // 存储当前透明度状态
            floorData.currentOpacity = opacity;
        }
        
        // 重置所有楼层的透明度
        function resetFloorTransparency() {
            for (let f = 1; f <= 3; f++) {
                const floorData = floors[f];
                if (!floorData || !floorData.group) continue;
                
                floorData.group.traverse(obj => {
                    if (obj.isMesh && obj.material) {
                        // 检查是否是点击层（书架格子或大门），保持永远透明
                        if (obj.userData && (obj.userData.isShelfLayer || obj.userData.isDoor)) {
                            obj.material.opacity = 0;
                            obj.visible = true;
                            return;
                        }
                        
                        // 恢复原始透明度
                        if (obj.material.userData && obj.material.userData.originalOpacity !== undefined) {
                            obj.material.opacity = obj.material.userData.originalOpacity;
                        } else {
                            obj.material.opacity = 1.0;
                        }
                        obj.visible = true;
                    }
                });
                
                floorData.currentOpacity = 1.0;
            }
        }
        
        // 用户操作时恢复楼层透明度
        function onUserOperation() {
            resetFloorTransparency();
        }
        
        animate();
        
        window.addEventListener('resize', ()=>{
            camera.aspect = window.innerWidth/window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        });
        
        // 暴露API_KEY需在env.js定义
        console.log('系统初始化完成，请确保模型文件存在并配置书架位置');
    </script>
