    <style>

<body>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: auto; 
      overflow: hidden;
    }

    /* 3D 渲染容器 */
    #canvas-container {
      position: relative; 
      width: 100%;
      min-height: 100px; 
    }
  </style>
    <!-- 原有的控制面板 -->
    <div id="controlsContainer">
        <div id="controlButtons">
            <button id="startBtn" class="control-btn start-btn" title="设置起点">
                <i class="fas fa-play"></i>
            </button>
            <button id="endBtn" class="control-btn end-btn" title="设置终点">
                <i class="fas fa-flag"></i>
            </button>
            <button id="calcBtn" class="control-btn calc-btn" title="计算路径">
                <i class="fas fa-route"></i>
            </button>
        </div>
        <div id="infoDisplay">
            <div id="startInfo">起点: 未设置</div>
            <div id="endInfo">终点: 未设置</div>
            <div id="pathInfo" class="path-info">路径: 未计算</div>
        </div>
    </div>

    <!-- 新增聊天面板 -->
    <div id="chatPanel">
        <div class="chat-header" id="chatHeader">
            <span><i class="fas fa-robot" style="margin-right: 8px;"></i>图书馆AI助理</span>
            <i class="fas fa-chevron-down minimize-icon" id="minimizeIcon"></i>
        </div>
        <div class="chat-content" id="chatContent">
            <div class="api-key-row">
                <input type="password" id="apiKeyInput" placeholder="DeepSeek API Key (sk-...)" value="">
                <button id="resetChatBtn">重置</button>
            </div>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-error" id="chatError"></div>
            <div class="chat-input-area">
                <input type="text" id="userInput" placeholder="例如：推荐一本人工智能的书" autocomplete="off">
                <button id="sendBtn">发送</button>
            </div>
        </div>
    </div>
    <script>
        const scene = new THREE.Scene();
        window.scene = scene;
        scene.background = new THREE.Color(0x87CEEB);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({antialias: true});
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        const loader = new THREE.GLTFLoader();
        
        // 1. 环境光（照亮所有角落，避免死黑）
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.45);
        scene.add(ambientLight);

        // 2. 主方向光（模拟太阳光，投下柔和阴影）
        const mainLight = new THREE.DirectionalLight(0xffffff, 0.8);
        mainLight.position.set(-30, 35, -20); // 高角度斜射，符合100m场景尺寸
        mainLight.castShadow = true;

        // 阴影参数适配100m场景
        mainLight.shadow.mapSize.width = 512;
        mainLight.shadow.mapSize.height = 512;
        mainLight.shadow.camera.near = 0.1;
        mainLight.shadow.camera.far = 150; // 覆盖整个100m场景
        mainLight.shadow.camera.left = -60;
        mainLight.shadow.camera.right = 60;
        mainLight.shadow.camera.top = 60;
        mainLight.shadow.camera.bottom = -60;
        mainLight.shadow.bias = -0.0001; // 避免阴影失真
        mainLight.shadow.intensity = 0.6; // 阴影柔和度

        scene.add(mainLight);

        // 3. 补光（消除主光造成的硬阴影）
        const fillLight = new THREE.DirectionalLight(0xffffff, 0.3);
        fillLight.position.set(30, 30, 20);
        scene.add(fillLight);

        // 天蓝色雾，和你的背景 #87CEEB 完全匹配
        scene.fog = new THREE.FogExp2(0x87CEEB, 0.016);
        // 书架点击系统相关变量
        let raycaster = new THREE.Raycaster();
        let mouse = new THREE.Vector2();
        let isSettingStart = false;
        let isSettingEnd = false;
        let startPoint = null;
        let endPoint = null;
        let startMarker = null;
        let endMarker = null;
        let clickableLayers = []; // 所有可点击的书架层
        let shelves = []; // 所有书架对象
        // 在现有变量后添加
        let doorLayers = [];
        // 在现有变量后添加
        let verticalConnectors = []; // 垂直连接线数组
        // 大门参数
        const DOOR_PARAMS = {
            width: 2.0,
            height: 2.1,
            centerX: 0.5,
            centerY: 1.05,
            centerZ: -11.5,
            depth: 0.8
        };
        // 书架参数（基于原有书架尺寸）
        const SHELF_PARAMS = {
            width: 3.0,     // 宽3.0m
            height: 2.0,    // 高2.0m
            depth: 1.0,     // 深1.0m
            columns: 3,     // 三列
            rows: 4,        // 四层
            columnWidth: 1.0,   // 每列宽1.0m
            rowHeight: 0.5,     // 每层高0.5m
            frontOffset: 0.1,   // 正面偏移
            backOffset: -0.1    // 背面偏移
        };
        // 在全局变量区域添加大门统一位置
        const DOOR_UNIFIED_POSITION = {
            x: 0.5,          // 大门中心X坐标
            y: 2.6,          // 大门精灵的Y坐标 (从createDoorSign函数获取)
            z: -11.3         // 大门精灵的Z坐标
        };

        // ========== 路径规划网格系统 ==========
        // 网格参数
        const GRID_SIZE = 0.5; // 格子大小0.5m
        const GRID_Y = 0.01;   // 网格高度（略高于地面防止穿模）
        const GRID_X_MIN = -8.5; // 图书馆西墙
        const GRID_X_MAX = 8.5;  // 图书馆东墙
        const GRID_Z_MIN = -11.5; // 图书馆南墙
        const GRID_Z_MAX = 9.5;   // 图书馆北墙

        // 计算网格维度（确保原点是网格交点）
        const GRID_COLS = Math.floor((GRID_X_MAX - GRID_X_MIN) / GRID_SIZE) + 1;
        const GRID_ROWS = Math.floor((GRID_Z_MAX - GRID_Z_MIN) / GRID_SIZE) + 1;

        console.log(`网格系统: ${GRID_COLS}列×${GRID_ROWS}行, 原点(${GRID_X_MIN}, ${GRID_Z_MIN})`);

            // 原有的3D系统代码保持不变，只是添加一些全局变量的声明
            // 确保API可以访问的关键全局变量
            
            // ========== 全局变量声明 ==========
            // 这些变量在原有代码中已经定义，这里确保它们在全局作用域可访问
            window.clickableLayers = [];
            window.doorLayers = [];
            window.shelves = [];
            window.startPoint = null;
            window.endPoint = null;
            window.startMarker = null;
            window.endMarker = null;
            window.pathLine = null;
            window.verticalConnectors = [];
            window.isSettingStart = false;
            window.isSettingEnd = false;
            window.gridMap = [];

        // 网格节点类
        class GridNode {
            constructor(gridX, gridZ) {
                this.gridX = gridX; // 网格X索引
                this.gridZ = gridZ; // 网格Z索引
                this.worldX = GRID_X_MIN + gridX * GRID_SIZE; // 世界X坐标
                this.worldZ = GRID_Z_MIN + gridZ * GRID_SIZE; // 世界Z坐标
                this.worldY = GRID_Y; // 世界Y坐标
                
                this.walkable = true; // 是否可通行
                this.type = 'normal'; // 节点类型: normal, shelf, forbidden_area, reading_area
                this.parent = null;   // A*父节点
                this.g = Infinity;           // 从起点到当前节点的代价
                this.h = 0;           // 启发式代价
                this.f = Infinity;           // 总代价
                
                // 邻居节点（8方向）
                this.neighbors = [];
            }
        }

        // 网格系统
        let gridMap = [];
        let pathLine = null; // 路径线对象

        // ========== A*路径规划算法 ==========
        class AStarPathfinder {
            constructor(grid) {
                this.grid = grid;
            }
            
            // 获取节点的8个邻居
            getNeighbors(node) {
                const neighbors = [];
                const directions = [
                    {dx: -1, dz: 0, cost: 1.0},   // 左
                    {dx: 1, dz: 0, cost: 1.0},    // 右
                    {dx: 0, dz: -1, cost: 1.0},   // 上
                    {dx: 0, dz: 1, cost: 1.0},    // 下
                    {dx: -1, dz: -1, cost: 1.414}, // 左上
                    {dx: 1, dz: -1, cost: 1.414},  // 右上
                    {dx: -1, dz: 1, cost: 1.414},  // 左下
                    {dx: 1, dz: 1, cost: 1.414}    // 右下
                ];
                
                for (const dir of directions) {
                    const newX = node.gridX + dir.dx;
                    const newZ = node.gridZ + dir.dz;
                    
                    // 检查边界
                    if (newX >= 0 && newX < GRID_COLS && newZ >= 0 && newZ < GRID_ROWS) {
                        const neighbor = this.grid[newZ][newX];
                        
                        // 检查是否可通行
                        if (neighbor.walkable) {
                            // 对于对角线移动，需要确保两侧直线方向也可通行
                            if (Math.abs(dir.dx) === 1 && Math.abs(dir.dz) === 1) {
                                const side1 = this.grid[node.gridZ + dir.dz][node.gridX];
                                const side2 = this.grid[node.gridZ][node.gridX + dir.dx];
                                
                                if (side1.walkable && side2.walkable) {
                                    neighbors.push({node: neighbor, cost: dir.cost});
                                }
                            } else {
                                neighbors.push({node: neighbor, cost: dir.cost});
                            }
                        }
                    }
                }
                
                return neighbors;
            }
            
            // 欧几里得距离启发函数
            heuristic(nodeA, nodeB) {
                const dx = nodeA.gridX - nodeB.gridX;
                const dz = nodeA.gridZ - nodeB.gridZ;
                return Math.sqrt(dx * dx + dz * dz);
            }
            
            // 主寻路函数
            findPath(startNode, endNode) {
                // 起点终点检查
                if (!startNode.walkable) {
                    console.error("起点不可通行");
                    return null;
                }
                
                if (!endNode.walkable) {
                    console.error("终点不可通行");
                    return null;
                }
                
                const openSet = [];
                const closedSet = new Set();
                
                // 初始化起点
                startNode.g = 0;
                startNode.h = this.heuristic(startNode, endNode);
                startNode.f = startNode.g + startNode.h;
                
                openSet.push(startNode);
                
                while (openSet.length > 0) {
                    // 获取F值最小的节点
                    let currentNode = openSet[0];
                    let currentIndex = 0;
                    
                    for (let i = 1; i < openSet.length; i++) {
                        if (openSet[i].f < currentNode.f) {
                            currentNode = openSet[i];
                            currentIndex = i;
                        }
                    }
                    
                    // 如果找到终点
                    if (currentNode === endNode) {
                        const path = [];
                        let current = currentNode;
                        while (current) {
                            path.push({
                                x: current.worldX,
                                y: GRID_Y + 0.02, // 略高于网格避免渲染问题
                                z: current.worldZ
                            });
                            current = current.parent;
                        }
                        return path.reverse();
                    }
                    
                    // 将当前节点移到closedSet
                    openSet.splice(currentIndex, 1);
                    closedSet.add(currentNode);
                    
                    // 获取邻居
                    const neighbors = this.getNeighbors(currentNode);
                    
                    for (const neighbor of neighbors) {
                        const neighborNode = neighbor.node;
                        
                        // 如果已在closedSet中，跳过
                        if (closedSet.has(neighborNode)) {
                            continue;
                        }
                        
                        // 计算新的G值
                        const tentativeG = currentNode.g + neighbor.cost;
                        
                        // 如果这是更好的路径
                        if (tentativeG < neighborNode.g || !openSet.includes(neighborNode)) {
                            neighborNode.parent = currentNode;
                            neighborNode.g = tentativeG;
                            neighborNode.h = this.heuristic(neighborNode, endNode);
                            neighborNode.f = neighborNode.g + neighborNode.h;
                            
                            if (!openSet.includes(neighborNode)) {
                                openSet.push(neighborNode);
                            }
                        }
                    }
                }
                
                // 未找到路径
                console.warn("未找到路径");
                return null;
            }
        }

        // ========== 坐标转换函数 ==========
        // 世界坐标 -> 网格索引
        function worldToGridIndex(worldX, worldZ) {
            const gridX = Math.round((worldX - GRID_X_MIN) / GRID_SIZE);
            const gridZ = Math.round((worldZ - GRID_Z_MIN) / GRID_SIZE);
            
            // 确保在网格范围内
            return {
                x: Math.max(0, Math.min(gridX, GRID_COLS - 1)),
                z: Math.max(0, Math.min(gridZ, GRID_ROWS - 1))
            };
        }

        // 网格索引 -> 世界坐标
        function gridIndexToWorld(gridX, gridZ) {
            return {
                x: GRID_X_MIN + gridX * GRID_SIZE,
                z: GRID_Z_MIN + gridZ * GRID_SIZE,
                y: GRID_Y
            };
        }

                // ========== 简化的特殊书架障碍物标记 ==========

        // ========== 计算并显示路径 ==========
        window.calculateAndShowPath = function() {

        if (!startPoint || !endPoint) {

        // ========== 重置网格节点状态（A*算法相关状态） ==========
        function resetGridNodeStates() {
            console.log("重置网格节点A*算法状态...");
            
            let resetCount = 0;
            
            for (let z = 0; z < GRID_ROWS; z++) {
                for (let x = 0; x < GRID_COLS; x++) {
                    const node = gridMap[z][x];
                    
                    // 重置A*算法相关的属性
                    node.parent = null;
                    node.g = Infinity;
                    node.h = 0;
                    node.f = Infinity;
                    
                    // 清空邻居数组（如果需要重新计算）
                    // 注意：如果网格结构不变，邻居关系不需要每次重置
                    // node.neighbors = [];
                    
                    resetCount++;
                }
            }
            
            console.log(`已重置 ${resetCount} 个网格节点的A*状态`);
        }

        // ========== 可视化路径 ==========
        // ========== 可视化路径（带状的路径平面） ==========
        // ========== 可视化路径（真正的二维带状平面） ==========
    // ========== 可视化路径（带白色箭头的二维带状平面） ==========
        // ========== 可视化路径（带正确方向箭头的二维带状平面） ==========
        function visualizePathWithArrows(path) {
            console.log("开始绘制带正确方向箭头的二维带状路径...");
            
            // 1. 移除旧路径
            if (pathLine) {
                scene.remove(pathLine);
                pathLine = null;
            }
            
            if (path.length < 2) {
                console.warn("路径点不足，无法绘制路径带");
                return;
            }
            
            // 2. 配置参数
            const PATH_WIDTH = 0.4; // 路径宽度（米）
            const PATH_COLOR = 0x2196F3; // 路径颜色（蓝色）
            const PATH_OPACITY = 0.7; // 路径透明度
            const ARROW_COLOR = 0xFFFFFF; // 箭头颜色（白色）
            
            // 3. 创建路径带几何体
            const geometry = new THREE.BufferGeometry();
            const vertices = [];
            const uvs = [];
            const indices = [];
            
            // 生成带状路径的顶点
            for (let i = 0; i < path.length; i++) {
                const point = path[i];
                
                // 计算当前点的切线方向（前进方向）
                let tangent;
                if (i === 0) {
                    // 第一个点：使用下一个点的方向
                    const nextPoint = path[i + 1];
                    tangent = new THREE.Vector3(
                        nextPoint.x - point.x,
                        0,
                        nextPoint.z - point.z
                    ).normalize();
                } else if (i === path.length - 1) {
                    // 最后一个点：使用前一个点的方向
                    const prevPoint = path[i - 1];
                    tangent = new THREE.Vector3(
                        point.x - prevPoint.x,
                        0,
                        point.z - prevPoint.z
                    ).normalize();
                } else {
                    // 中间点：使用前后点的平均方向
                    const prevPoint = path[i - 1];
                    const nextPoint = path[i + 1];
                    tangent = new THREE.Vector3(
                        nextPoint.x - prevPoint.x,
                        0,
                        nextPoint.z - prevPoint.z
                    ).normalize();
                }
                
                // 计算垂直于切线的法线（在XZ平面上） - 这是正确的
                const normal = new THREE.Vector3(-tangent.z, 0, tangent.x).normalize();
                
                // 计算左右边界点
                const leftPoint = new THREE.Vector3(
                    point.x + normal.x * PATH_WIDTH / 2,
                    point.y + 0.001, // 稍微抬高避免Z-fighting
                    point.z + normal.z * PATH_WIDTH / 2
                );
                
                const rightPoint = new THREE.Vector3(
                    point.x - normal.x * PATH_WIDTH / 2,
                    point.y + 0.001,
                    point.z - normal.z * PATH_WIDTH / 2
                );
                
                // 添加顶点
                vertices.push(leftPoint.x, leftPoint.y, leftPoint.z);  // 左边界
                vertices.push(rightPoint.x, rightPoint.y, rightPoint.z); // 右边界
                
                // 添加UV坐标
                // 关键：U方向沿着路径前进方向，V方向是路径宽度方向
                const u = i / (path.length - 1);
                uvs.push(-u, 0);  // 左边UV
                uvs.push(-u, 1);  // 右边UV
            }
            
            // 创建三角形索引
            for (let i = 0; i < path.length - 1; i++) {
                const base = i * 2;
                indices.push(base, base + 1, base + 2);
                indices.push(base + 1, base + 3, base + 2);
            }
            
            // 设置几何体属性
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
            geometry.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
            geometry.setIndex(indices);
            geometry.computeVertexNormals();
            
            // 4. 创建带箭头纹理的材质
            const texture = createDirectionalArrowTexture(PATH_COLOR, ARROW_COLOR);
            const material = new THREE.MeshLambertMaterial({
                map: texture,
                transparent: true,
                opacity: PATH_OPACITY,
                side: THREE.DoubleSide
            });
            
            // 5. 设置纹理
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            texture.repeat.set(path.length * 0.3, 1); // 控制箭头密度
            
            // 6. 创建路径网格
            pathLine = new THREE.Mesh(geometry, material);
            scene.add(pathLine);
            
            // 7. 计算路径长度并显示
            const pathLength = calculatePathLength(path);
            updatePathInfo(pathLength);
            
            // 8. 添加垂直连接线
            addVerticalConnectors(path[0], path[path.length - 1]);
            
            console.log(`带正确方向箭头的二维路径带绘制完成`);
        }
        // ========== 创建指向性箭头纹理 ==========
        function createDirectionalArrowTexture(pathColor, arrowColor) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            // 设置画布大小（长条形，便于箭头沿着路径方向）
            canvas.width = 512; // 长度方向
            canvas.height = 128; // 宽度方向
            
            // 计算颜色
            const pathColorHex = '#' + pathColor.toString(16).padStart(6, '0');
            const arrowColorHex = '#' + arrowColor.toString(16).padStart(6, '0');
            
            // 1. 绘制路径背景（渐变效果，沿宽度方向渐变）
            const gradient = ctx.createLinearGradient(0, 0, canvas.height, 0);
            gradient.addColorStop(0, pathColorHex + 'AA'); // 边缘半透明
            gradient.addColorStop(0.5, pathColorHex + 'FF'); // 中间不透明
            gradient.addColorStop(1, pathColorHex + 'AA'); // 边缘半透明
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 2. 绘制方向箭头（沿着长度方向）
            // 箭头参数
            const arrowSpacing = canvas.width / 5; // 5个箭头
            const arrowLength = arrowSpacing * 0.4; // 箭头长度
            const arrowWidth = canvas.height * 0.6; // 箭头宽度
            
            ctx.fillStyle = arrowColorHex + 'FF';
            ctx.strokeStyle = arrowColorHex + 'FF';
            ctx.lineWidth = 2;
            
            for (let i = 0; i < 5; i++) {
                const x = i * arrowSpacing + arrowSpacing / 2;
                const y = canvas.height / 2;
                
                // 绘制箭头（三角形，指向右边）
                ctx.beginPath();
                ctx.moveTo(x - arrowLength / 2, y); // 箭头尾部中心
                ctx.lineTo(x + arrowLength / 2, y - arrowWidth / 2); // 箭头尖端右上
                ctx.lineTo(x + arrowLength / 2, y + arrowWidth / 2); // 箭头尖端右下
                ctx.closePath();
                ctx.fill();
                
                // 添加发光效果
                ctx.shadowColor = 'white';
                ctx.shadowBlur = 8;
                ctx.fill();
                ctx.shadowBlur = 0;
                
                // 绘制箭头中心线
                ctx.beginPath();
                ctx.moveTo(x - arrowLength / 2, y);
                ctx.lineTo(x + arrowLength / 2, y);
                ctx.stroke();
            }
            
            // 3. 添加路径边缘线
            ctx.strokeStyle = arrowColorHex + '80';
            ctx.lineWidth = 1;
            ctx.strokeRect(0, 0, canvas.width, canvas.height);
            
            // 创建Three.js纹理
            const texture = new THREE.CanvasTexture(canvas);
            texture.needsUpdate = true;
            
            return texture;
        }
// ========== 创建箭头纹理 ==========
        function createArrowTexture(pathColor, arrowColor, pathWidth) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            // 设置画布大小（宽度较大以容纳箭头图案）
            canvas.width = 512;
            canvas.height = 256;
            
            // 清除画布
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 计算颜色
            const pathColorHex = '#' + pathColor.toString(16).padStart(6, '0');
            const arrowColorHex = '#' + arrowColor.toString(16).padStart(6, '0');
            
            // 绘制路径背景（渐变效果）
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, pathColorHex + 'CC');
            gradient.addColorStop(0.5, pathColorHex + '99');
            gradient.addColorStop(1, pathColorHex + 'CC');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制箭头（白色三角形）
            const arrowCount = 8; // 纹理中箭头的数量
            const arrowSpacing = canvas.width / arrowCount;
            const arrowWidth = canvas.width * 0.08; // 箭头宽度
            const arrowHeight = canvas.height * 0.6; // 箭头高度
            
            ctx.fillStyle = arrowColorHex + 'FF'; // 白色不透明
            
            for (let i = 0; i < arrowCount; i++) {
                const x = i * arrowSpacing + arrowSpacing / 2;
                const y = canvas.height / 2;
                
                // 绘制三角形箭头
                ctx.beginPath();
                ctx.moveTo(x, y - arrowHeight / 2); // 顶点
                ctx.lineTo(x - arrowWidth / 2, y + arrowHeight / 2); // 左下角
                ctx.lineTo(x + arrowWidth / 2, y + arrowHeight / 2); // 右下角
                ctx.closePath();
                ctx.fill();
                
                // 添加发光效果
                ctx.shadowColor = 'white';
                ctx.shadowBlur = 5;
                ctx.fill();
                ctx.shadowBlur = 0;
            }
            
            // 添加边框
            ctx.strokeStyle = arrowColorHex + '80';
            ctx.lineWidth = 2;
            ctx.strokeRect(1, 1, canvas.width - 2, canvas.height - 2);
            
            // 创建Three.js纹理
            const texture = new THREE.CanvasTexture(canvas);
            texture.needsUpdate = true;
            
            return texture;
        }

    // ========== 为路径创建纹理（增强视觉效果） ==========
        

        // ========== 计算路径长度 ==========
        // ========== 计算路径长度 ==========
        function calculatePathLength(path) {
            let length = 0;
            for (let i = 0; i < path.length - 1; i++) {
                const dx = path[i+1].x - path[i].x;
                const dz = path[i+1].z - path[i].z;
                length += Math.sqrt(dx * dx + dz * dz);
            }
            return length;
        }

        // ========== 简化版：使用平面的带状几何体 ==========
        function visualizePathSimple(path) {
            console.log("开始绘制简化版二维路径带...");
            
            // 移除旧路径
            if (pathLine) {
                scene.remove(pathLine);
                pathLine = null;
            }
            
            if (path.length < 2) return;
            
            // 配置
            const PATH_WIDTH = 0.35;
            const PATH_COLOR = 0x2196F3;
            
            // 创建几何体
            const geometry = new THREE.BufferGeometry();
            const vertices = [];
            
            // 生成路径带顶点（简单的带状）
            for (let i = 0; i < path.length; i++) {
                const point = path[i];
                
                if (i < path.length - 1) {
                    // 计算两个点之间的方向和垂直方向
                    const nextPoint = path[i + 1];
                    const dx = nextPoint.x - point.x;
                    const dz = nextPoint.z - point.z;
                    const length = Math.sqrt(dx * dx + dz * dz);
                    
                    if (length > 0) {
                        const tangent = new THREE.Vector3(dx / length, 0, dz / length);
                        const normal = new THREE.Vector3(-tangent.z, 0, tangent.x);
                        
                        // 当前点的左右边界
                        const left1 = new THREE.Vector3(
                            point.x + normal.x * PATH_WIDTH / 2,
                            point.y,
                            point.z + normal.z * PATH_WIDTH / 2
                        );
                        const right1 = new THREE.Vector3(
                            point.x - normal.x * PATH_WIDTH / 2,
                            point.y,
                            point.z - normal.z * PATH_WIDTH / 2
                        );
                        
                        // 下一个点的左右边界
                        const left2 = new THREE.Vector3(
                            nextPoint.x + normal.x * PATH_WIDTH / 2,
                            nextPoint.y,
                            nextPoint.z + normal.z * PATH_WIDTH / 2
                        );
                        const right2 = new THREE.Vector3(
                            nextPoint.x - normal.x * PATH_WIDTH / 2,
                            nextPoint.y,
                            nextPoint.z - normal.z * PATH_WIDTH / 2
                        );
                        
                        // 添加两个四边形（4个三角形）
                        vertices.push(
                            // 第一个三角形
                            left1.x, left1.y, left1.z,
                            right1.x, right1.y, right1.z,
                            left2.x, left2.y, left2.z,
                            
                            // 第二个三角形
                            right1.x, right1.y, right1.z,
                            right2.x, right2.y, right2.z,
                            left2.x, left2.y, left2.z
                        );
                    }
                }
            }
            
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
            
            // 创建材质
            const material = new THREE.MeshBasicMaterial({
                color: PATH_COLOR,
                transparent: true,
                opacity: 0.7,
                side: THREE.DoubleSide,
                depthWrite: false // 简化版可以关闭深度写入
            });
            
            // 创建网格
            pathLine = new THREE.Mesh(geometry, material);
            
            // 设置渲染顺序，确保在地面上方
            pathLine.renderOrder = 0;
            
            scene.add(pathLine);
            
            // 添加垂直连接线
            addVerticalConnectors(path[0], path[path.length - 1]);
            
            console.log("简化版二维路径带绘制完成");
        }   

        

        // ========== 添加发光边缘效果 ==========
        function addGlowEffect(mesh, color) {
            // 创建边缘几何体（比主路径稍大）
            const edges = new THREE.EdgesGeometry(mesh.geometry, 1);
            const lineMaterial = new THREE.LineBasicMaterial({
                color: color,
                linewidth: 2,
                transparent: true,
                opacity: 0.9
            });
            
            const edgeLines = new THREE.LineSegments(edges, lineMaterial);
            mesh.add(edgeLines); // 作为子对象添加到路径网格
            
            // 存储引用，以便后续移除
            mesh.userData.edgeLines = edgeLines;
        }

    // ========== 创建透明玻璃围墙 ==========
    function createGlassWall() {
        // 玻璃材质
        const glassMaterial = new THREE.MeshPhysicalMaterial({
            color: 0x88ccff,      // 淡蓝色
            transparent: true,
            opacity: 0.2,         // 非常透明
            roughness: 0.05,      // 光滑
            metalness: 0.0,
            transmission: 0.95,   // 高透光性
            thickness: 0.1,       // 玻璃厚度
            side: THREE.DoubleSide // 双面渲染
        });
        
        const wallHeight = 1.2;   // 围墙高度1.2米
        const wallThickness = 0.05; // 围墙厚度5厘米
        
        // 创建围墙函数
        function createWallSegment(startX, startZ, endX, endZ) {
            // 计算墙的长度
            const length = Math.sqrt(Math.pow(endX - startX, 2) + Math.pow(endZ - startZ, 2));
            
            // 创建墙的几何体
            const geometry = new THREE.BoxGeometry(length, wallHeight, wallThickness);
            const wall = new THREE.Mesh(geometry, glassMaterial);
            
            // 计算墙的中心位置
            const centerX = (startX + endX) / 2;
            const centerZ = (startZ + endZ) / 2;
            
            // 设置墙的位置（Y坐标从地面开始）
            wall.position.set(centerX, wallHeight / 2, centerZ);
            
            // 计算旋转角度（使墙沿着两点连线方向）
            const angle = Math.atan2(endZ - startZ, endX - startX);
            wall.rotation.y = -angle; // 负号是因为Three.js的坐标系
            
            return wall;
        }
        
        // 定义四边围墙的坐标（大门处留出缺口）
        // 北墙 (Z=9.5)
        const northWall = createWallSegment(-8.5, 9.5, 8.5, 9.5);
        scene.add(northWall);
        
        // 南墙 (Z=-11.5)，分两段避开大门
        // 左段：从(-8.5, -11.5)到(-1.5, -11.5)
        const southWallLeft = createWallSegment(-8.5, -11.5, -0.5, -11.5);
        scene.add(southWallLeft);
        
        // 右段：从(0.5, -11.5)到(8.5, -11.5)
        const southWallRight = createWallSegment(1.5, -11.5, 8.5, -11.5);

    // ========== 创建围墙顶部装饰线 ==========
    function createWallTopEdging() {
        // 金属装饰线材质
        const metalMaterial = new THREE.MeshStandardMaterial({
            color: 0xcccccc,      // 浅灰色
            roughness: 0.3,
            metalness: 0.8
        });
        
        const edgingHeight = 0.05;   // 装饰线高度5厘米
        const edgingThickness = 0.06; // 装饰线厚度6厘米（比围墙略厚）
        
        // 创建装饰线函数（与创建墙类似但更细）
        function createEdgingSegment(startX, startZ, endX, endZ) {
            const length = Math.sqrt(Math.pow(endX - startX, 2) + Math.pow(endZ - startZ, 2));
            const geometry = new THREE.BoxGeometry(length, edgingHeight, edgingThickness);
            const edging = new THREE.Mesh(geometry, metalMaterial);
            
            const centerX = (startX + endX) / 2;
            const centerZ = (startZ + endZ) / 2;
            
            // 放置在围墙顶部，比围墙高半个装饰线高度
            edging.position.set(centerX, 1.2 + edgingHeight / 2, centerZ);
            
            const angle = Math.atan2(endZ - startZ, endX - startX);
            edging.rotation.y = -angle;
            
            return edging;
        }
        
        // 添加四边的装饰线
        scene.add(createEdgingSegment(-8.5, 9.5, 8.5, 9.5));           // 北墙顶部
        scene.add(createEdgingSegment(-8.5, -11.5, -0.5, -11.5));      // 南墙左段顶部
        scene.add(createEdgingSegment(1.5, -11.5, 8.5, -11.5));        // 南墙右段顶部
        scene.add(createEdgingSegment(-8.5, -11.5, -8.5, 9.5));        // 西墙顶部
        scene.add(createEdgingSegment(8.5, -11.5, 8.5, 9.5));          // 东墙顶部
    }
    createWallTopEdging();

    // ========== 创建文字精灵函数 ==========
    function createTextSprite(text, color = 0xffff00, bgColor = 0x000000, fontSize = 0.5) {
        const canvas = document.createElement('canvas');
        const context = canvas.getContext('2d');
        
        // 设置画布大小
        const textHeight = 128;
        canvas.width = text.length * 100;
        canvas.height = textHeight;
        
        // 绘制背景
        context.fillStyle = `rgba(${bgColor >> 16}, ${(bgColor >> 8) & 0xff}, ${bgColor & 0xff}, 0.8)`;
        context.fillRect(0, 0, canvas.width, canvas.height);
        
        // 绘制文字
        context.font = `bold ${textHeight * 0.8}px Arial`;
        context.textAlign = 'center';
        context.textBaseline = 'middle';
        context.fillStyle = `rgb(${color >> 16}, ${(color >> 8) & 0xff}, ${color & 0xff})`;
        context.fillText(text, canvas.width / 2, canvas.height / 2);
        
        // 创建纹理
        const texture = new THREE.CanvasTexture(canvas);
        texture.needsUpdate = true;
        
        // 创建精灵材质
        const spriteMaterial = new THREE.SpriteMaterial({
            map: texture,
            transparent: true,
            opacity: 0.9,
            depthTest: false  // 总是显示在最前面
        });
        
        // 创建精灵
        const sprite = new THREE.Sprite(spriteMaterial);
        
        // 设置精灵大小
        const scale = fontSize;
        sprite.scale.set(canvas.width / canvas.height * scale, scale, 1);
        
        return sprite;
    }

    function createShelfClickableLayers(shelf, shelfIndex, isRotated = false) {
        const columns = SHELF_PARAMS.columns;
        const rows = SHELF_PARAMS.rows;
        
        // 获取书架的旋转角度
        const shelfRotation = isRotated ? Math.PI / 2 : 0;
        
        // 创建正面点击区域
        for (let col = 0; col < columns; col++) {
            for (let row = 0; row < rows; row++) {
                // 正面点击层
                createClickableLayer(shelf, shelfIndex, col, row, 'back', shelfRotation);
                
                // 背面点击层
                createClickableLayer(shelf, shelfIndex, col, row, 'front', shelfRotation);
            }
        }
    }

    // ========== 创建单个点击层 ==========
    function createClickableLayer(shelf, shelfIndex, column, row, face, shelfRotation = 0) {
        // 计算层在书架局部坐标系中的位置（书架未旋转时的位置）
        const localX = (column - (SHELF_PARAMS.columns-1)/2) * SHELF_PARAMS.columnWidth;
        const localY = (row - (SHELF_PARAMS.rows-1)/2) * SHELF_PARAMS.rowHeight;
        
        // 根据正面/背面设置Z坐标
        let localZ;
        let layerRotationY = 0; // 点击层自身的旋转
        
        if (face === 'back') {
            localZ = SHELF_PARAMS.depth / 2 + SHELF_PARAMS.frontOffset;
            // 正面朝向外部
            layerRotationY = 0;
        } else { // 'front'
            localZ = -SHELF_PARAMS.depth / 2 + SHELF_PARAMS.backOffset;
            // 背面朝向外部，需要旋转180度
            layerRotationY = Math.PI;
        }
        
        // 创建透明点击平面
        const geometry = new THREE.PlaneGeometry(
            SHELF_PARAMS.columnWidth * 0.99,  // 稍微缩小避免重叠
            SHELF_PARAMS.rowHeight * 0.99
        );
        const material = new THREE.MeshBasicMaterial({
            color: 0x000000,
            transparent: true,
            opacity: 0.0,  // 完全透明，不可见
            side: THREE.DoubleSide
        });
        
        const clickableLayer = new THREE.Mesh(geometry, material);
        
        // 设置点击层的位置（局部坐标系）
        clickableLayer.position.set(localX, localY, localZ);
        
        // 设置点击层的旋转：先应用层自身的旋转，然后加上书架的旋转
        clickableLayer.rotation.y = layerRotationY;
        
        // 存储点击层信息
        clickableLayer.userData = {
            isShelfLayer: true,
            shelfIndex: shelfIndex,
            column: column + 1,  // 列号从1开始
            row: row + 1,        // 层号从1开始
            face: face,
            shelfRotation: shelfRotation,
            shelf: shelf,
            localPosition: new THREE.Vector3(localX, localY, localZ)
        };
        
        // 添加到书架
        shelf.add(clickableLayer);
        clickableLayers.push(clickableLayer);
    }

    function createDoorPlane(face) {

            transparent: true,
            opacity: 0.0,

            // ========== 鼠标点击事件处理 ==========
    renderer.domElement.addEventListener('click', onMouseClick, false);

    function onMouseClick(event) {
        if (!isSettingStart && !isSettingEnd) return;
        
        const rect = renderer.domElement.getBoundingClientRect();
        mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
        mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
        
        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(clickableLayers);
        
        if (intersects.length > 0) {
            const clickedLayer = intersects[0].object;
            const layerData = clickedLayer.userData;
            
            if (layerData.isDoor) {
                // 大门处理 - 现在都显示为"大门"
                if (isSettingStart) {
                    setDoorStartPoint(layerData, clickedLayer);
                } else if (isSettingEnd) {
                    setDoorEndPoint(layerData, clickedLayer);
                }
            } else {
                // 书架处理
                if (isSettingStart) {
                    setStartPoint(layerData, clickedLayer);
                } else if (isSettingEnd) {
                    setEndPoint(layerData, clickedLayer);
                }
            }
            
            // 提示信息也统一为"大门"
            let message = '';
            if (layerData.isDoor) {
                message = '已选择大门';  // 不再显示内外侧
            } else {
                const faceText = layerData.face === 'back' ? '背面' : '正面';
                message = `已选择书架${layerData.shelfIndex} ${faceText} 第${layerData.column}列第${layerData.row}层`;
            }
            
            showClickHint(message);
        }
    }

    // ========== 计算标记位置 ==========
    function calculateMarkerPosition(layerData, clickedLayer) {  // 添加clickedLayer参数
        // 获取点击层的世界位置
        const layerWorldPos = new THREE.Vector3();
        clickedLayer.getWorldPosition(layerWorldPos);
        
        // 获取点击层的Z轴方向（面向方向）
        const zDirection = new THREE.Vector3(0, 0, 1);
        clickedLayer.localToWorld(zDirection);
        zDirection.sub(layerWorldPos).normalize();
        
        // 沿着点击层面向的方向偏移
        const offsetDistance = 0.1;
        const markerPos = layerWorldPos.clone().add(zDirection.multiplyScalar(offsetDistance));
        
        return markerPos;
    }

        // ========== 小程序通信相关 ==========
        // 向小程序发送消息
        function sendMessageToMiniProgram(data) {
            if (window.wx && window.wx.miniProgram) {
                window.wx.miniProgram.postMessage({
                    data: data
                });
                console.log('[WebView] 发送消息到小程序:', data);

        // 处理 URL hash 变化
        function handleHashChange() {
            const hash = window.location.hash.substring(1); // 去掉 '#'
            if (!hash) return;
            
            try {
                const command = JSON.parse(decodeURIComponent(hash));
                console.log('[WebView] 收到命令:', command);
                
                // 检查 API 是否就绪
                if (!window.LibraryNavigationAPI) {
                    console.error('[WebView] API 未就绪');
                    sendMessageToMiniProgram({
                        type: 'error',
                        message: 'API 未就绪',
                        command: command.action,
                        messageId: command.messageId
                    });
                    return;
                }
                
                // 根据命令类型执行 API
                let result;
                switch (command.action) {

                    case 'init':
                        // 验证数据
                        if (!command.data || !command.data.start || !command.data.end) {
                            sendMessageToMiniProgram({
                                type: 'error',
                                message: 'init命令缺少start或end数据',
                                command: command.action,
                                messageId: command.messageId
                            });
                            return;
                        }
                        
                        // 设置起点
                        const startResult = LibraryNavigationAPI.setStartPoint(command.data.start);
                        if (!startResult.success) {
                            sendMessageToMiniProgram({
                                type: 'error',
                                message: '设置起点失败: ' + startResult.error,
                                command: command.action,
                                messageId: command.messageId
                            });
                            return;
                        }
                        
                        // 设置终点
                        const endResult = LibraryNavigationAPI.setEndPoint(command.data.end);
                        if (!endResult.success) {
                            sendMessageToMiniProgram({
                                type: 'error',
                                message: '设置终点失败: ' + endResult.error,
                                command: command.action,
                                messageId: command.messageId
                            });
                            return;
                        }
                        
                        // 计算路径
                        const calcResult = LibraryNavigationAPI.calculatePath();
                        if (!calcResult.success) {
                            sendMessageToMiniProgram({
                                type: 'error',
                                message: '计算路径失败: ' + calcResult.error,
                                command: command.action,
                                messageId: command.messageId
                            });
                            return;
                        }
                        
                        // 全部成功，返回结果
                        sendMessageToMiniProgram({
                            type: 'initResult',
                            success: true,
                            data: { message: '初始化成功' },
                            messageId: command.messageId,
                            timestamp: Date.now()
                        });
                        break;
                    case 'setStart':
                        result = LibraryNavigationAPI.setStartPoint(command.data);
                        break;
                    case 'setEnd':
                        result = LibraryNavigationAPI.setEndPoint(command.data);
                        break;
                    case 'calculate':
                        result = LibraryNavigationAPI.calculatePath();
                        break;
                    case 'clear':
                        result = LibraryNavigationAPI.clear();
                        break;
                    case 'getStatus':
                        result = LibraryNavigationAPI.getStatus();
                        break;
                    default:
                        console.warn('[WebView] 未知命令:', command.action);
                        sendMessageToMiniProgram({
                            type: 'error',
                            message: '未知命令',
                            command: command.action,
                            messageId: command.messageId
                        });
                        return;
                }
                
                // 将执行结果返回给小程序
                sendMessageToMiniProgram({
                    type: command.action + 'Result',
                    success: result?.success || false,
                    data: result,
                    messageId: command.messageId,
                    timestamp: Date.now()
                });
                
            } catch (e) {
                console.error('[WebView] 处理 hash 失败:', e);
                sendMessageToMiniProgram({
                    type: 'error',
                    message: e.message,
                    error: e.toString()
                });
            }
        }
        
        // 监听 hash 变化
        window.addEventListener('hashchange', handleHashChange);

            // ========== 新增聊天助理功能 ==========
        (function() {
            // --- 配置 ---
            const DEEPSEEK_API_URL = 'https://api.deepseek.com/v1/chat/completions';
            const MODEL_NAME = 'deepseek-chat';

            // --- 系统提示词 (强制末尾括号+书架) ---
            const SYSTEM_MESSAGE = {
                role: 'system',
                content: '你是合肥工业大学图书馆的智能助理。你的核心任务是为读者推荐书籍。\n' +
                         '每次回复时，你**必须**在末尾添加两个个小括号，括号内严格用例子的格式，指明所推荐书籍的具体书架位置。\n' +
                         '（起点：大门，终点：书架13 背面 第1列第3层）\n' +
                         '只有14个书架（书架1-14），三列四层。\n' +
                         '你可以自由推荐各类书籍，并附上恰当的位置（哪怕编造一个合理的合工大书架号）。\n' +
                         '如果用户只是打招呼，你也应该推荐一本书并附上括号。保持热情、专业的图书馆助理形象。'
            };

            // 初始助理消息
            const initialAssistantMessage = {
                role: 'assistant',
                content: '同学你好，我是合肥工业大学图书馆助理。今天想为你推荐《科学革命的结构》。（起点：大门，终点：书架13 背面 第1列第3层）'
            };

            // 聊天状态
            let chatHistory = [initialAssistantMessage];
            let isLoading = false;
            let apiReady = false; // API是否就绪（3D系统）

            // DOM 元素
            const chatMessages = document.getElementById('chatMessages');
            const userInput = document.getElementById('userInput');
            const sendBtn = document.getElementById('sendBtn');
            const apiKeyInput = document.getElementById('apiKeyInput');
            const resetBtn = document.getElementById('resetChatBtn');
            const chatError = document.getElementById('chatError');
            const chatHeader = document.getElementById('chatHeader');
            const chatPanel = document.getElementById('chatPanel');
            const minimizeIcon = document.getElementById('minimizeIcon');

            // --- 渲染聊天消息 ---
            function renderMessages() {
                chatMessages.innerHTML = '';
                chatHistory.forEach(msg => {
                    const messageDiv = document.createElement('div');
                    messageDiv.classList.add('message');
                    messageDiv.classList.add(msg.role === 'user' ? 'message-user' : 'message-assistant');

                    const roleTag = document.createElement('div');
                    roleTag.classList.add('role-tag');
                    roleTag.textContent = msg.role === 'user' ? '你' : '📘 图书馆助理';
                    messageDiv.appendChild(roleTag);

                    const bubble = document.createElement('div');
                    bubble.classList.add('bubble');
                    bubble.textContent = msg.content;
                    messageDiv.appendChild(bubble);

                    chatMessages.appendChild(messageDiv);
                });
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }

            // 添加消息到历史
            function addMessage(role, content) {
                chatHistory.push({ role, content });
                renderMessages();
            }

            // 显示错误
            function showError(text) {
                chatError.textContent = text;
                chatError.classList.add('show');
            }

            function hideError() {
                chatError.classList.remove('show');
            }

            // --- 调用 DeepSeek API ---
            async function fetchAssistantReply(userMessage) {
                const apiKey = apiKeyInput.value.trim();
                if (!apiKey) throw new Error('请输入 DeepSeek API 密钥');

                const messagesForApi = [SYSTEM_MESSAGE, ...chatHistory];

                const response = await fetch(DEEPSEEK_API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: MODEL_NAME,
                        messages: messagesForApi,
                        temperature: 0.8,
                        max_tokens: 800
                    })
                });

                if (!response.ok) {
                    let errorDetail = `HTTP ${response.status}`;
                    try {
                        const errData = await response.json();
                        errorDetail = errData.error?.message || JSON.stringify(errData);
                    } catch (e) {}
                    throw new Error(`API 错误: ${errorDetail}`);
                }

                const data = await response.json();
                const content = data.choices?.[0]?.message?.content;
                if (!content) throw new Error('API 返回异常: 没有回复内容');
                return content;
            }

            // --- 解析导航信息 ---
            function parseNavigationInfo(text) {
                // 提取括号内的内容
                const bracketMatch = text.match(/（([^）]+)）/g);
                if (!bracketMatch) return null;

                // 取最后一个括号（可能多个，按规则应在末尾）
                const lastBracket = bracketMatch[bracketMatch.length - 1];
                const content = lastBracket.slice(1, -1); // 去掉括号

                // 分割起点和终点
                const parts = content.split('，');
                let startText = '', endText = '';
                for (let part of parts) {
                    if (part.includes('起点：')) startText = part.replace('起点：', '').trim();
                    if (part.includes('终点：')) endText = part.replace('终点：', '').trim();
                }

                if (!startText || !endText) return null;

                // 解析起点
                let startData = null;
                if (startText.includes('大门')) {
                    startData = { isDoor: true };
                } else {
                    const shelfMatch = startText.match(/书架(\d+)\s*(背面|正面)?\s*第(\d+)列第(\d+)层/);
                    if (shelfMatch) {
                        startData = {
                            isDoor: false,
                            shelfIndex: parseInt(shelfMatch[1]),
                            face: shelfMatch[2] === '背面' ? 'back' : 'front',
                            column: parseInt(shelfMatch[3]),
                            row: parseInt(shelfMatch[4])
                        };
                    }
                }

                // 解析终点
                let endData = null;
                if (endText.includes('大门')) {
                    endData = { isDoor: true };
                } else {
                    const shelfMatch = endText.match(/书架(\d+)\s*(背面|正面)?\s*第(\d+)列第(\d+)层/);
                    if (shelfMatch) {
                        endData = {
                            isDoor: false,
                            shelfIndex: parseInt(shelfMatch[1]),
                            face: shelfMatch[2] === '背面' ? 'back' : 'front',
                            column: parseInt(shelfMatch[3]),
                            row: parseInt(shelfMatch[4])
                        };
                    }
                }

                if (!startData || !endData) return null;
                return { start: startData, end: endData };
            }

            // --- 调用导航API设置起点终点并计算路径 ---
            function applyNavigation(navInfo) {
                if (!window.LibraryNavigationAPI) {
                    showError('导航系统未就绪');
                    return false;
                }

                // 清除当前设置（可选）
                // LibraryNavigationAPI.clear();

                // 设置起点
                const startResult = LibraryNavigationAPI.setStartPoint(navInfo.start);
                if (!startResult.success) {
                    showError(`设置起点失败: ${startResult.error}`);
                    return false;
                }

                // 设置终点
                const endResult = LibraryNavigationAPI.setEndPoint(navInfo.end);
                if (!endResult.success) {
                    showError(`设置终点失败: ${endResult.error}`);
                    return false;
                }

                // 计算路径
                const calcResult = LibraryNavigationAPI.calculatePath();
                if (!calcResult.success) {
                    showError(`计算路径失败: ${calcResult.error}`);
                    return false;
                }

                // 可选：在聊天中提示
                addMessage('assistant', '✅ 已自动设置导航并计算路径');
                return true;
            }

            // --- 发送消息 ---
            async function handleSend() {
                if (isLoading) return;

                const userMsg = userInput.value.trim();
                if (!userMsg) return;

                if (!apiKeyInput.value.trim()) {
                    showError('请输入 DeepSeek API 密钥');
                    return;
                }

                if (!apiReady) {
                    showError('3D导航系统正在初始化，请稍候...');
                    return;
                }

                hideError();
                addMessage('user', userMsg);
                userInput.value = '';
                isLoading = true;
                sendBtn.disabled = true;
                userInput.disabled = true;

                try {
                    const reply = await fetchAssistantReply(userMsg);
                    addMessage('assistant', reply);

                    // 解析并应用导航
                    const navInfo = parseNavigationInfo(reply);
                    if (navInfo) {
                        applyNavigation(navInfo);
                    } else {
                        // 可选提示
                        console.log('未解析到导航信息');
                    }
                } catch (error) {
                    showError(error.message);
                } finally {
                    isLoading = false;
                    sendBtn.disabled = false;
                    userInput.disabled = false;
                    userInput.focus();
                }
            }

            // --- 重置对话 ---
            function resetConversation() {
                chatHistory = [initialAssistantMessage];
                renderMessages();
                hideError();
            }

            // --- 监听API就绪 ---
            function waitForAPI() {
                if (window.LibraryNavigationAPI && window.LibraryNavigationAPI._ready) {
                    apiReady = true;
                    sendBtn.disabled = false;
                    userInput.disabled = false;
                    console.log('聊天助理：导航API已就绪');
                } else {
                    setTimeout(waitForAPI, 500);
                }
            }
            waitForAPI();

            // --- 事件绑定 ---
            sendBtn.addEventListener('click', handleSend);
            userInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleSend();
                }
            });
            resetBtn.addEventListener('click', resetConversation);
            apiKeyInput.addEventListener('input', hideError);

            // 面板最小化
            chatHeader.addEventListener('click', () => {
                chatPanel.classList.toggle('minimized');
                minimizeIcon.style.transform = chatPanel.classList.contains('minimized') ? 'rotate(180deg)' : 'rotate(0deg)';
            });

            // 初始渲染
            renderMessages();

            // 如果API已就绪，启用输入
            if (window.LibraryNavigationAPI && window.LibraryNavigationAPI._ready) {
                apiReady = true;
                sendBtn.disabled = false;
                userInput.disabled = false;
            }
        })();
